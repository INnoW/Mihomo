# ======= 策略组 ======= #
[policy]
# > static 策略组中，你需要手动选择想要的节点/策略组
# > available 自动选择可用节点，按顺序找第一个能连通的节点，类似故障转移
# > round-robin 轮询模块，按顺序轮流使用组内节点，适合负载均衡
# > dest-hash：根据目标域名哈希选择节点，同一域名始终走同一节点，有利于保持连接
