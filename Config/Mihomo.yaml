# 名称： Mihomo Ruleset
# 版本： Ver.4.2
# 日期： 2026年4月7日
# 地址： https://github.com/INnoW/Mihomo
# 说明： ①本文件适用于Mihomo核心的工具使用，如：OpenWrt（OpenClash/Nikki 插件）、Stash、FlClash； ②使用前需补充完整 “订阅链接” 与 “机场名”，并将 “nameserver” 修改为运营商提供的 DNS 地址;
# ※※※※※※※※※※※※※※※ 锚点定义 ※※※※※※※※※※※※※※※
rule-anchor:
  # 订阅参数锚点
  Sub_Parameters: &SP {type: http, interval: 86400, health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 600}, header: {User-Agent: ["clash.meta", "clash", "mihomo"]}}
  
  # DNS参数锚点
  Dns_Default: &DF ['1.1.1.1', '114.114.114.114']
  Dns_Public: &DP ['https://dns.alidns.com/dns-query', 'https://cloudflare-dns.com/dns-query']
  Dns_Direct: &DD ['223.5.5.5', '119.29.29.29']
  
  # 节点策略锚点
  Proxy: &S1 {type: select, proxies: [🇭🇰 香港节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇯🇵 日本节点, 🐽 手动切换1, 🐽 手动切换2, 🛩️ 故障转移, 🎯 DIRECT]}
  Online: &S2 {type: select, proxies: [🛩️ 故障转移, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇯🇵 日本节点, 🐽 手动切换1, 🐽 手动切换2, 🎯 DIRECT]}
  Direct: &S3 {type: select, proxies: [🎯 DIRECT, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇯🇵 日本节点, 🐽 手动切换1, 🐽 手动切换2, 🛩️ 故障转移]}
  
  # 节点筛选锚点
  Hongkong: &HK "(?=.*(🇭🇰|港|HK|(?i)hong))^((?!(台|日|韩|新|美)).)*$"
  Singapore: &SGP "(?=.*(🇸🇬|新|狮|SG|SGP|(?i)singapore))^((?!(港|台|日|韩|美)).)*$"
  America: &USA "(?=.*(🇺🇸|美|US|(?i)states|america))^((?!(港|台|日|韩|新)).)*$"
  Japan: &JP "(?=.*(🇯🇵|日|JP(?i)japan))^((?!(港|台|韩|新|美)).)*$"
  Other: &OR "^((?!(🇭🇰|港|HK|hong|🇸🇬|新|狮|SG|SGP|singapore|🇺🇸|美|US|states|america|🇯🇵|日|JPjapan|官网|剩余|套餐|流量|套餐|订阅|直连|GB|expireDate|traffic)).)*$"
  Exclude: &EX "^((?!(官网|剩余|套餐|流量|套餐|订阅|直连|GB|expireDate|traffic)).)*$"
  Combo: &CB "(?=.*(🇭🇰|港|HK|(?i)hong|🇯🇵|日|JP(?i)japan|🇸🇬|新|狮|SGP|(?i)singapore|🇺🇸|美|US|(?i)states|america))^((?!(官网|剩余|套餐|流量|套餐|订阅|直连|GB|expireDate|traffic)).)*$"
  
# 代理策略组
  All: &SC {type: select, include-all: true} 
  airport 1: &A1 {type: select, use: [airport 1]}
  airport 2: &A2 {type: select, use: [airport 2]}
  Url_test: &URL {type: url-test, include-all: true, interval: 600, lazy: true, url: 'https://www.gstatic.com/generate_204'}
  FallBack_airport 1: &FA1 {type: fallback, use: [airport 1], interval: 600, lazy: true, url: 'https://www.gstatic.com/generate_204'}
  FallBack_airport 2: &FA2 {type: fallback, use: [airport 2], interval: 600, lazy: true, url: 'https://www.gstatic.com/generate_204'}
  FallBack_a1a2: &A1A2 {type: fallback, use: [airport 1,airport 2], interval: 600, lazy: false, url: 'https://www.gstatic.com/generate_204'}
  
  # 规则集类型
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}

# 机场订阅(填入你的机场订阅链接，如删除机场数量需在前后代理策略组同时修改参数)
proxy-providers:
  airport 1: {<<: *SP,  proxy: 🎯 全球直连, url: '机场链接'}
  airport 2: {<<: *SP,  proxy: 🎯 全球直连, url: '机场链接'}

# 节点信息
proxies:
  - {name: 🎯 DIRECT, type: direct, udp: true}

# ※※※※※※※※※※※※※※※ 核心配置 ※※※※※※※※※※※※※※※
# 基础配置
# interface-name: en0                                                   # 分流指定  强制代理使用en0接口来收发流量

port: 7890                                                              # 监听端口  混合代理端口
socks-port: 7891                                                        # 监听端口  Socks端口
redir-port: 7892                                                        # 监听端口  Redirect端口
mixed-port: 7893                                                        # 监听端口  Mixed混合代理端口
tproxy-port: 7894                                                       # 监听端口  Tproxy端口
allow-lan: true                                                         # 局域连接  是否允许局域网设备连接
bind-address: "*"                                                       # 监听接口  监听的网络接口（* 表示所有接口）
ipv6: true                                                              # 网络协议  是否启用 IPv6 支持
unified-delay: true                                                     # 统一延迟  减少节点延迟抖动
tcp-concurrent: true                                                    # 并发连接  提升多任务性能
log-level: info                                                         # 日志级别  silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
find-process-mode: 'off'                                                # 性能优化  进程匹配
global-client-fingerprint: chrome                                       # 流量伪装  模仿Chrome浏览器的TLS握手特征，增加流量被识别的难度
keep-alive-idle: 600                                                    # TCP保活  TCP连接空闲 600秒 (10分钟) 后，开始发送“心跳包”检测连接是否存活
keep-alive-interval: 15                                                 # TCP保活  如果连接持续空闲，每隔 15秒 发送一次探测包，直到收到回应或达到重试次数上限
disable-keep-alive: false                                               # TCP保活  对空闲连接进行保活检测
profile:
  store-selected: true                                                  # 保存选择  记住上次选择的节点和策略组
  store-fake-ip: true                                                   # 保存映射  Fake-IP 映射以加快 DNS 命中

# 地理数据
#geo-auto-update: true                                                   # 自动更新  geodata
#geo-update-interval: 48                                                 # 更新间隔  单位：小时
#geodata-mode: true                                                      # 数据分流  使用数据集进行规则与分流匹配
#geox-url:
#  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
#  geoip:   https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
#  mmdb:    https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
#  asn:     https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

# 控制面板
external-controller: 0.0.0.0:9988                                       # 面板地址
external-ui-name: zashboard                                             # 面板名称
external-ui: ui                                                         # 面板目录
secret: ""                                                              # 面板密码 （留空表示不启用）
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true                                                          # 启用嗅探  提升分流准确性
  sniff:
    QUIC:                                                               # 嗅探参数  QUIC 协议流量（HTTP/3 常用端口）
      ports: [443, 8443]
    TLS:                                                                # 嗅探参数  HTTPS（TLS）常用及备用端口
      ports: [443, 8443]
    HTTP:                                                               # 嗅探参数  HTTP 及常见 Web / 代理端口段
      ports: [80, 8080-8880]
      override-destination: true                                        # 嗅探成功  HTTP 嗅探成功后覆盖目标地址
  force-domain:
    - "+.v2ex.com"                                                      # 强制嗅探  v2ex 主域名
    - "+.netflix.com"                                                   # 强制嗅探  Netflix 主域名
    - "+.nflxvideo.net"                                                 # 强制嗅探  Netflix CDN
    - "+.amazonaws.com"                                                 # 强制嗅探  AWS 云服务
    - "+.media.dssott.com"                                              # 强制嗅探  Disney+ 流媒体
  skip-domain:
    - "+.apple.com"                                                     # 跳过嗅探  苹果服务
    - Mijia Cloud                                                       # 跳过嗅探  米家云服务
    - dlg.io.mi.com                                                     # 跳过嗅探  小米设备通信
    - "+.oray.com"                                                      # 跳过嗅探  花生壳服务
    - "+.sunlogin.net"                                                  # 跳过嗅探  向日葵远程控制
    - "+.apple.com"                                                     # 跳过嗅探  苹果相关服务
    - "+.push.apple.com"                                                # 跳过嗅探  苹果推送服务
    - "+.wechat.com"                                                    # 跳过嗅探  微信相关服务
    - "+.wechatapp.com"                                                 # 跳过嗅探  微信软件相关服务
    - "+.qpic.cn"                                                       # 跳过嗅探  腾讯内容分发服务
    - "+.qq.com"                                                        # 跳过嗅探  腾讯QQ服务
    - "+.vivox.com"                                                     # 跳过嗅探  Unity游戏语音Vivox服务
    - "+.msftncsi.com"                                                  # 跳过嗅探  微软网络连接状态服务
    - "+.msftconnecttest.com"                                           # 跳过嗅探  苹果推送服务

# TUN配置 
tun:
# strict-route: false                                                   # 路由模式  严格路由模式
# endpoint-independent-nat: true                                        # 端点无关  NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）

  enable: true                                                          # 网卡模式  是否启用 TUN 虚拟网卡模式  
  stack: mixed                                                          # 协议类型  网络栈：system（系统栈）/ gvisor（内置用户态栈）/ mixed（混合）
  dns-hijack: ["any:53", "tcp://any:53"]                                # 劫持请求  劫持所有 UDP/TCP 53 端口的 DNS 请求
  auto-route: true                                                      # 自动路由  自动添加系统路由表      （仅内核模式有效）
  auto-redirect: true                                                   # 自动定向  自动将流量重定向至 TUN  （仅内核模式有效）
  auto-detect-interface: true                                           # 自动出口  自动识别默认出口网络接口 （仅内核模式有效）

# DNS模块
dns:
  enable: true                                                          # 解析服务  启用 Clash 内置 DNS 服务
  cache-algorithm: arc                                                  # 缓存算法  LRU（最近最少使用）/ARC（自适应替换缓存）
  listen: 0.0.0.0:1053                                                  # 监听服务  DNS 服务监听地址与端口
  ipv6: true                                                            # 网络协议  启用 IPv6 DNS 解析支持
  respect-rules: false                                                  # 遵循规则  不强制遵循规则顺序
  enhanced-mode: fake-ip                                                # 增强模式  FDNS 增强模式（Fake-IP，用于防止 DNS 泄露）
  fake-ip-range: 198.18.0.1/16                                          # 虚拟地址  Fake-IP 虚拟地址池范围
  fake-ip-filter-mode: blacklist                                        # 过滤模式  Fake-IP 过滤模式（命中规则则返回真实 IP）
  default-nameserver: *DF                                               # 解析服务  解析nameserver中配置的DNS服务器本身的域名
  proxy-server-nameserver: *DP                                          # 解析服务  解析代理服务器的域名（如节点地址的域名）
  nameserver: *DD                                                       # 解析服务  解析所有域名的DNS服务器
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain,private_domain,cn_domain"           # 真实解析  常见局域网域名后缀
 
